services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tasks_db"]
      interval: 3s
      timeout: 3s
      retries: 10
  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:pass@db:5432/tasks_db
      FLASK_ENV: testing
    volumes:
      - ./:/app
  api:
    build: ./api
    depends_on:
      tests:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://user:pass@db:5432/tasks_db
      FLASK_ENV: development
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app

  frontend:
    build: ./frontend
    depends_on: [api]
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pg_data: